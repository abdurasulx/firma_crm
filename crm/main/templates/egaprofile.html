{% extends 'egabase.html' %}
{% load static %}

{% block title %}Profilim{% endblock %}

{% block content %}
<style>
    .profile-container {
        max-width: 600px;
        margin: auto;
        background-color: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
    }

    .profile-image {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #6f42c1;
        margin-bottom: 15px;
    }

    .profile-info h2 {
        margin: 10px 0 5px;
        color: #333;
    }

    .profile-info p {
        margin: 5px 0;
        color: #666;
        font-size: 15px;
    }

    .edit-button {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #6f42c1;
        color: white;
        border: none;
        border-radius: 5px;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.3s;
    }

    .edit-button:hover {
        background-color: #5a34a3;
    }

    @media screen and (max-width: 600px) {
        .profile-container {
            padding: 20px 15px;
        }

        .profile-image {
            width: 90px;
            height: 90px;
        }
    }
</style>

<div class="profile-container">
    <img src="{% if user.rasmi %}{{ user.rasmi.url }}{% else %}{% static 'images/default_avatar.jpg' %}{% endif %}" alt="Avatar" class="profile-image">
    
    <div class="profile-info">
        <h2>{{ user.tuliq_ismi }}</h2>
        <p><strong>Foydalanuvchi nomi:</strong> {{ user.username }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Telefon:</strong> {{ user.telefon|default:"Ko‘rsatilmagan" }}</p>
        <p><strong>Rol:</strong> {{ user.get_turi_display }}</p>
    </div>

    
</div>
{% endblock %}
