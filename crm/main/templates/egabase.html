<!DOCTYPE html>
{% load static %}
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Firma CRM{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #10b981;
            --primary-dark: #059669;
            --secondary-color: #667eea;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --border-color: #e5e7eb;
            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
            transition: all 0.3s ease;
            z-index: 1000;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo {
            font-size: 28px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            color: white;
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .sidebar-brand {
            opacity: 0;
            width: 0;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 32px;
            width: 24px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .sidebar-menu {
            padding: 20px 0;
            list-style: none;
        }

        .menu-item {
            margin: 4px 12px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .menu-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .menu-link.active {
            background: var(--primary-color);
            color: white;
        }

        .menu-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .menu-text {
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .menu-text {
            opacity: 0;
            width: 0;
        }

        /* Main Content */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed~.main-wrapper {
            margin-left: var(--sidebar-collapsed);
        }

        /* Top Header */
        .top-header {
            background: white;
            padding: 16px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .user-profile:hover {
            background: var(--border-color);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 14px;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-light);
        }

        .dropdown-toggle {
            font-size: 12px;
            color: var(--text-light);
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .user-profile.active .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: var(--text-dark);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .dropdown-item:first-child {
            border-radius: 12px 12px 0 0;
        }

        .dropdown-item:last-child {
            border-radius: 0 0 12px 12px;
            border-top: 1px solid var(--border-color);
        }

        .dropdown-item:hover {
            background: var(--bg-light);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        /* Mobile Responsive */
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mobile-overlay.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-wrapper {
                margin-left: 0 !important;
            }

            .mobile-overlay {
                display: block;
            }

            .mobile-overlay.active {
                display: block;
            }

            .top-header {
                padding: 12px 15px;
            }

            .header-title {
                font-size: 18px;
            }

            .user-info {
                display: none;
            }

            .main-content {
                padding: 20px 15px;
            }

            .hamburger {
                display: flex !important;
            }
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger span {
            width: 24px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo"><i class="fa-solid fa-building"></i></span>
            <span class="sidebar-brand">Firma CRM</span>
        </div>
        <div class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-chevron-right"></i></div>

        <ul class="sidebar-menu">
            <li class="menu-item">
                <a href="{% url 'main' %}" class="menu-link {% if request.path == '/' %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                    <span class="menu-text">Dashboard</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'hodimlar_list' %}"
                    class="menu-link {% if '/hodimlar/' in request.path %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-users"></i></span>
                    <span class="menu-text">Hodimlar</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'mahsulotlar_list' %}"
                    class="menu-link {% if '/mahsulotlar/' in request.path or '/product/' in request.path %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-box"></i></span>
                    <span class="menu-text">Mahsulotlar</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'mijozlar_list' %}"
                    class="menu-link {% if '/mijozlar/' in request.path or '/mijoz/' in request.path %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-store"></i></span>
                    <span class="menu-text">Mijozlar</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'hisobotlar' %}"
                    class="menu-link {% if '/hisobotlar/' in request.path %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-chart-bar"></i></span>
                    <span class="menu-text">Hisobotlar</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'nasiya_savdolar' %}"
                    class="menu-link {% if '/nasiya-savdolar/' in request.path %}active{% endif %}">
                    <span class="menu-icon"><i class="fa-solid fa-credit-card"></i></span>
                    <span class="menu-text">Nasiya Savdolar</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Top Header -->
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="hamburger" onclick="openMobileSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <h1 class="header-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </div>

            <div class="header-actions">
                <div class="user-profile" id="userProfile" onclick="toggleUserDropdown()">
                    <img src="{% if request.user.rasmi %}{{ request.user.rasmi.url }}{% else %}{% static 'images/default_avatar.jpg' %}{% endif %}"
                        alt="Avatar" class="user-avatar">
                    <div class="user-info">
                        <span class="user-name">{{ request.user.tuliq_ismi }}</span>
                        <span class="user-role">Ega</span>
                    </div>
                    <span class="dropdown-toggle"><i class="fa-solid fa-chevron-down"></i></span>
                    <div class="user-dropdown">
                        <a href="{% url 'profile' request.user.username %}" class="dropdown-item">
                            <i class="fa-solid fa-user"></i> Profil
                        </a>
                        <a href="{% url 'logout' %}" class="dropdown-item">
                            <i class="fa-solid fa-right-from-bracket"></i> Chiqish
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        // Toggle sidebar collapse
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');

            // Save state to localStorage
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        // Load sidebar state
        window.addEventListener('load', function () {
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                document.getElementById('sidebar').classList.add('collapsed');
            }
        });

        // Toggle user dropdown
        function toggleUserDropdown() {
            const userProfile = document.getElementById('userProfile');
            userProfile.classList.toggle('active');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const userProfile = document.getElementById('userProfile');
            if (!userProfile.contains(event.target)) {
                userProfile.classList.remove('active');
            }
        });

        // Mobile sidebar functions
        function openMobileSidebar() {
            document.getElementById('sidebar').classList.add('mobile-open');
            document.getElementById('mobileOverlay').classList.add('active');
        }

        function closeMobileSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('mobileOverlay').classList.remove('active');
        }
    </script>
</body>

</html>
