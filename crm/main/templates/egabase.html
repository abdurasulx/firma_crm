<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ega paneli{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f4f8;
        }

        header {
            background-color: #007acc;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .left-nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-group {
            position: relative;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .nav-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-items {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background-color: #ffffff;
            color: #333;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 160px;
        }

        .nav-items a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.2s;
        }

        .nav-items a:hover {
            background-color: #f1f4f8;
        }

        .nav-group.open .nav-items {
            display: block;
        }

        .right-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notif-icon {
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s;
            color: white;
            text-decoration: none;
        }

        .notif-icon:hover {
            color: #ff9800;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
        }

        .profile {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .profile img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        .profile-name {
            color: white;
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
        }

        .logout-panel {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            padding: 5px 0;
            min-width: 100%;
            text-align: center;
            z-index: 1000;
        }

        .logout-panel a {
            display: block;
            padding: 6px 10px;
            color: #dc3545;
            font-weight: 600;
            text-decoration: none;
        }

        .logout-panel a:hover {
            background-color: #f8d7da;
            color: #a71d2a;
        }

        .profile-wrapper:hover .logout-panel {
            display: block;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .left-nav {
                flex-direction: column;
                gap: 10px;
            }

            .nav-items {
                position: static;
                box-shadow: none;
                background-color: #e3f2fd;
            }

            .nav-items a {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="left-nav">
        <div class="nav-group">
            <button class="nav-toggle">Ishchilar</button>
            <div class="nav-items">
                <a href="#">Ishchilar amallari</a>
                <a href="{% url 'crtuser' %}">Yangi ishchi qo‘shish</a>
            </div>
        </div>

        <div class="nav-group">
            <button class="nav-toggle">Menu</button>
            <div class="nav-items">
                <a href="#">Element A</a>
                <a href="#">Element B</a>
                <a href="#">Element C</a>
            </div>
        </div>
    </div>

    <div class="right-nav">
        <a href="{% url 'main' %}" class="notif-icon">🔔</a>

        <div class="profile-wrapper">
            <div class="profile">
                <img src="{% if request.user.rasmi %}{{ request.user.rasmi.url }}{% else %}{% static 'images/default_avatar.jpg' %}{% endif %}" alt="avatar">
                <span class="profile-name">{{ request.user.tuliq_ismi }}</span>
            </div>
            <div class="logout-panel">
                <a href="{% url 'logout' %}">Chiqish</a>
            </div>
        </div>
    </div>
</header>

{% block content %}
<!-- Kontent bu yerda ko‘rinadi -->
{% endblock %}

<script>
    document.querySelectorAll('.nav-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
            const parent = toggle.closest('.nav-group');
            document.querySelectorAll('.nav-group').forEach(group => {
                if (group !== parent) group.classList.remove('open');
            });
            parent.classList.toggle('open');
        });
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.nav-group')) {
            document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
        }
    });
</script>

</body>
</html>
