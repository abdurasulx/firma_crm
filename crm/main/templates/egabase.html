<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ega paneli{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #6c757d;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .left-nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-group {
            position: relative;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .nav-items {
            display: none;
            position: absolute;
            top: 35px;
            left: 0;
            background-color: white;
            color: #333;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 150px;
        }

        .nav-items a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
        }

        .nav-items a:hover {
            background-color: #f1f1f1;
        }

        .nav-group.open .nav-items {
            display: block;
        }

        .right-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .right-nav a {
            color: white;
            text-decoration: none;
        }

        .notif-icon {
            font-size: 20px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .left-nav {
                flex-direction: column;
                gap: 10px;
            }

            .nav-items {
                position: static;
                box-shadow: none;
                background-color: #eee;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="left-nav">
        <!-- Har bir bo‘lim uchun nav-group ishlatiladi -->
        <div class="nav-group">
            <button class="nav-toggle">Bo‘lim 1</button>
            <div class="nav-items">
                <a href="#">Element 1</a>
                <a href="#">Element 2</a>
            </div>
        </div>

        <div class="nav-group">
            <button class="nav-toggle">Bo‘lim 2</button>
            <div class="nav-items">
                <a href="#">Element A</a>
                <a href="#">Element B</a>
                <a href="#">Element C</a>
            </div>
        </div>
    </div>

    <div class="right-nav">
        <a href="{% url 'main' %}" class="notif-icon">🔔</a>
        <div class="profile">
            <a href="{% url 'profile' request.user.username %}">
                <img src="{% if request.user.rasmi %}{{ request.user.rasmi.url }}{% else %}{% static 'images/default_avatar.jpg' %}{% endif %}" alt="avatar">
            </a>
            <a href="{% url 'profile' request.user.username %}">{{ request.user.tuliq_ismi }}</a>
        </div>
    </div>
</header>

{% block content %}
<!-- Kontent bu yerda ko‘rinadi -->
{% endblock %}

<script>
    // Menyuni ochib/yopish uchun JS
    document.querySelectorAll('.nav-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
            const parent = toggle.closest('.nav-group');
            document.querySelectorAll('.nav-group').forEach(group => {
                if (group !== parent) group.classList.remove('open');
            });
            parent.classList.toggle('open');
        });
    });

    // Ekrandan tashqariga bosilganda menyuni yopish
    document.addEventListener('click', e => {
        if (!e.target.closest('.nav-group')) {
            document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
        }
    });
</script>

</body>
</html>
