{% extends 'egabase.html' %}
{% load static %}

{% block title %}Yangi Xodim Qo'shish{% endblock %}

{% block content %}
<style>
.form-container {
    background-color: white;
    max-width: 600px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #007acc;
}
.form-group {
    margin-bottom: 15px;
}
.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #333;
}
.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}
.preview-img {
    display: block;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #007acc;
    margin: 10px auto;
    cursor: pointer;
}
#preview-mashina {
    display: block;
    width: 150px;
    height: 100px;
    object-fit: cover;
    border: 2px solid #007acc;
    margin: 10px auto;
    cursor: pointer;
}
.submit-btn {
    width: 100%;
    padding: 12px;
    background-color: #007acc;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
}
.submit-btn:hover {
    background-color: #005fa3;
}
@media (max-width: 600px) {
    .form-container {
        padding: 20px;
    }
}
</style>

<div class="form-container">
    <h2>Yangi Xodim Qo'shish</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Login (foydalanuvchi nomi)</label>
            <input type="text" value="{{ username }}" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Parol</label>
            <input type="text" value="{{ password }}" id="password" minlength="8" name="password" required>
        </div>

        <div class="form-group">
            <label for="tuliq_ismi">To‘liq ismi</label>
            <input type="text" id="tuliq_ismi" value="{{ tuliq_ismi }}" name="tuliq_ismi" required>
        </div>

        <div class="form-group">
            <label for="telefon">Telefon raqam</label>
            <input type="tel" id="telefon" value="{{ telefon }}" name="telefon" placeholder="+998 90 123 45 67"  required>
        </div>

        <div class="form-group">
            <label for="turi">Xodim turi</label>
            <select id="turi" name="turi" required onchange="toggleMashinaFields()">
                <option value="pazanda" {% if turi == 'pazanda' %}selected{% endif %}>Pazanda</option>
                <option value="yetkazib_beruvchi" {% if turi == 'yetkazib_beruvchi' %}selected{% endif %}>Yetkazib beruvchi</option>
            </select>
        </div>

        <label for="rasmi_input"> Xodim rasmi 
            <img src="{% static 'images/default_avatar.jpg' %}" alt="Xodim rasmi" id="preview-rasm" class="preview-img">
        </label>
        <input type="file" id="rasmi_input" name="rasmi" style="display: none;" accept="image/*" onchange="showPreview(event, 'preview-rasm')" required>

        <div id="mashina-fields" style="{% if turi == 'yetkazib_beruvchi' %}display:block;{% else %}display:none;{% endif %}">
            <div class="form-group">
                <label for="mashina_nomi">Mashina nomi</label>
                <input type="text" id="mashina_nomi" value="{{ mashina_nomi }}" name="mashina_nomi">
            </div>

            <label for="mashina_rasmi_input">
                <img src="{% static 'images/damas.jpg' %}" alt="Mashina rasmi" id="preview-mashina">
            </label>
            <input type="file" id="mashina_rasmi_input"  name="mashina_rasmi" style="display: none;" accept="image/*" onchange="showPreview(event, 'preview-mashina')">
        </div>

        <button type="submit" class="submit-btn">Saqlash</button>
    </form>

    {% if messages %}
        <div style="margin-top: 15px;">
            {% for message in messages %}
                <div style="padding: 10px; border-radius: 4px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; margin-bottom: 5px;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>

<script>
function toggleMashinaFields() {
    const turi = document.getElementById("turi").value;
    const mashinaFields = document.getElementById("mashina-fields");
    mashinaFields.style.display = (turi === "yetkazib_beruvchi") ? "block" : "none";
}

function showPreview(event, imgId) {
    const input = event.target;
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById(imgId).src = reader.result;
    }
    if(input.files[0]){
        reader.readAsDataURL(input.files[0]);
    }
}
</script>

{% endblock %}
