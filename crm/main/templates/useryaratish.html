{% extends 'egabase.html' %}
{% load static %}

{% block title %}Yangi Xodim Qo'shish{% endblock %}

{% block content %}
<style>
.form-container {
    background-color: white;
    max-width: 600px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #007acc;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

.form-group input:focus,
.form-group select:focus {
    border-color: #007acc;
    outline: none;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background-color: #007acc;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
}

.submit-btn:hover {
    background-color: #005fa3;
}

@media (max-width: 600px) {
    .form-container {
        padding: 20px;
    }
}
</style>

<div class="form-container">
    <h2>Yangi Xodim Qo'shish</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Login (foydalanuvchi nomi)</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Parol</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="tuliq_ismi">To‘liq ismi</label>
            <input type="text" id="tuliq_ismi" name="tuliq_ismi" required>
        </div>

        <div class="form-group">
            <label for="telefon">Telefon raqam</label>
            <input type="tel" id="telefon" name="telefon" placeholder="+998 90 123 45 67" pattern="^\+998 \d{2} \d{3} \d{2} \d{2}$" required>
        </div>

        <div class="form-group">
            <label for="turi">Xodim turi</label>
            <select id="turi" name="turi" required onchange="toggleMashinaFields()">
          
                <option value="pazanda">Pazanda</option>
                <option value="yetkazib_beruvchi">Yetkazib beruvchi</option>
                
            </select>
        </div>

        <div class="form-group">
            <label for="rasmi">Xodim rasmi</label>
            <input type="file" id="rasmi" name="rasmi" accept="image/*">
        </div>

        <div id="mashina-fields" style="display: none;">
            <div class="form-group">
                <label for="mashina_nomi">Mashina nomi</label>
                <input type="text" id="mashina_nomi" name="mashina_nomi">
            </div>

            <div class="form-group">
                <label for="mashina_rasmi">Mashina rasmi</label>
                <input type="file" id="mashina_rasmi" name="mashina_rasmi" accept="image/*">
            </div>
        </div>

        <button type="submit" class="submit-btn">Saqlash</button>
    </form>
</div>

<script>
function toggleMashinaFields() {
    const turi = document.getElementById("turi").value;
    const mashinaFields = document.getElementById("mashina-fields");
    if (turi === "yetkazib_beruvchi") {
        mashinaFields.style.display = "block";
    } else {
        mashinaFields.style.display = "none";
    }
}
</script>
{% endblock %}
