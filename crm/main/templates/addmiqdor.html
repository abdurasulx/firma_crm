{% extends 'pzbase.html' %}
{% load static %}

{% block title %}Miqdor Qo‘shish{% endblock %}

{% block content %}
<style>
.form-container {
    max-width: 600px;
    margin: 30px auto;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.form-container h2 {
    text-align: center;
    color: #007acc;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.preview-img {
    display: block;
    max-width: 150px;
    margin: 10px auto;
    border-radius: 6px;
    border: 1px solid #ddd;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #007acc;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    background: #005fa3;
}
</style>

<div class="form-container">
    <h2>Miqdor Qo‘shish</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="mahsulot">Mahsulot tanlang</label>
            <select name="mahsulot" id="mahsulot" required >
                {% for m in mahsulotlar %}
                    <option value="{{ m.nomi }}">{{ m.nomi }} ({{ m.turi }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="miqdor">Miqdor</label>
            <input type="number" step="0.01" name="miqdor" id="miqdor" required placeholder="Miqdor kiriting">
        </div>

        <div class="form-group">
            <label for="rasm">Rasm yuklash (ixtiyoriy)</label>
            <input type="file" required name="rasm" id="rasm" accept="image/*" onchange="showPreview(event)">
            <img id="preview" class="preview-img" style="display: none;">
        </div>

        <button type="submit" class="submit-btn">Qo‘shish</button>
    </form>
</div>

<script>
let mahsulotDict = {};


    console.log("Barcha miqdorlar:", mahsulotDict);
document.addEventListener('DOMContentLoaded', function () {
    // Mahsulot IDlari asosida miqdorlar ro'yxati


    // Select elementi
    const select = document.getElementById("mahsulot");

    // Hodisani ulaymiz
    const tanlangan = select.value;

    // Rasm preview funksiyasi (o'zi ishlayapti)
    const fileInput = document.getElementById('rasm');
    fileInput.addEventListener("change", function (event) {
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(event.target.files[0]);
        preview.style.display = 'block';
    });
});

</script>

{% endblock %}
