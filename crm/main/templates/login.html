<!DOCTYPE html>
{% load static %}
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma CRM - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-header h1 {
            color: #1f2937;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message-box {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }

        .message-box p {
            color: #991b1b;
            font-size: 14px;
            margin: 0;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: #6b7280;
            font-size: 13px;
        }

        /* Loading state */
        .login-button.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🏢</div>
            <h1>Firma CRM</h1>
            <p>Tizimga kirish</p>
        </div>

        <form method="POST" onsubmit="handleSubmit(event)">
            {% csrf_token %}

            <div class="input-group">
                <label for="username">👤 Foydalanuvchi nomi</label>
                <input type="text" id="username" name="username" value="{{ username }}" required autocomplete="username"
                    placeholder="Username kiriting">
            </div>

            <div class="input-group">
                <label for="password">🔒 Parol</label>
                <input type="password" id="password" name="password" value="{{ password }}" required
                    autocomplete="current-password" placeholder="Parol kiriting">
            </div>

            <button type="submit" class="login-button" id="loginBtn">
                Kirish
            </button>
        </form>

        {% if messages %}
        <div class="message-box">
            {% for message in messages %}
            <p>❌ {{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <div class="footer-text">
            © 2026 Firma CRM. Barcha huquqlar himoyalangan.
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.textContent = 'Yuklanmoqda...';
        }

        // Auto-focus first input
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('username');
            if (!usernameInput.value) {
                usernameInput.focus();
            }
        });
    </script>
</body>

</html>
